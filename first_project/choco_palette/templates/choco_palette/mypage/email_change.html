<!--メールアドレス変更画面-->
{% extends "base.html" %}
{% load static %}

{% block header_left %}
<a href="{% url 'choco_palette:mypage' %}" style="text-decoration:none; font-size: 20px;">🔙</a>
{% endblock %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">メールアドレス変更</h2>
    
    <div class="form-group" style="text-align: left; margin-bottom: 20px;">
        <label style="font-weight: bold; margin-bottom: 10px; display: block;">現在のメールアドレス</label>
        <div class="custom-input" style="background-color: #f0f0f0; border: 1px solid #ccc; padding: 12px; border-radius: 8px; color: #333; min-height: 20px;">
            {{ user_email|default:"読み込み中..." }}
        </div>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="email-input-group" style="text-align: left; margin-bottom: 20px;">
            <label style="font-weight: bold; margin-bottom: 10px; display: block;">{{ form.email.label }}</label>
            {{ form.email }}
        </div>
        <button type="submit" class="btn btn-primary">変更</button>
    </form>
</div>
{% endblock %}
