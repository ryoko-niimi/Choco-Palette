<!--プロフィール設定編集画面-->
{% extends "base.html" %}
{% load static %}

{% block header_left %}
<a href="{% url 'choco_palette:mypage' %}" style="text-decoration:none; color:#4a2c2a;">🔙</a>
{% endblock %}

{% block content %}
<div class="card">
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div style="text-align: center; margin-bottom: 20px;">
        {% if profile.image %}
            <img src="{{ profile.image.url }}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
        {% else %}
            <img src="{% static 'images/default-avatar.png' %}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:10px;">
        {% endif %}
        
        <div class="icon-upload-wrapper" style="text-align: center;">
            <label for="id_image" class="upload-link" style="cursor: pointer; display: inline-block;">画像を編集する</label>
            <div style="display: none;">{{ form.image }}</div>
        </div>
    </div>
    
    <div class="form-group">
        <label for="id_nickname">名前/ニックネーム</label>
        {{ form.nickname }}
    </div>
        
        <div class="form-group">
            <label for="id_bio">自己紹介</label>
            {{ form.bio }}
        </div>
        
        <div class="form-group">
            <label for="id_link">リンクを追加</label>
            {{ form.link }}
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">編集する</button>
    </form>
</div>
{% endblock %}
