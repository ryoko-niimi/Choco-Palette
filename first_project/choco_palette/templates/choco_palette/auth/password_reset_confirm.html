<!--新パスワード設定画面-->

{% extends 'base.html' %}

{% block content %}
<div class="card"> <h2>パスワードの再設定</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                
                {% if field.name == 'new_password1' or field.name == 'new_password' %}
                    <small class="password-hint">※半角英数字を含む8文字以上</small>
                {% endif %}
                
                {% if field.errors %}
                    <div style="color: red; font-size: 0.8em; margin-top: 5px;">
                        {{ field.errors.as_text }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary" style="width: 100%;">再設定</button>
    </form>
</div>
{% endblock %}
