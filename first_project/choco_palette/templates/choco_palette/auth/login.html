<!--ログイン画面-->
{% extends 'base.html' %}

{% block content %}
<div class="card">
    
    {% if form.errors %}
        <p style="color: red; font-size: 14px;">メールアドレスまたはパスワードが正しくありません。</p>
    {% endif %}

    <form method="POST" id="login-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label>{{ form.username.label }}</label>
            {{ form.username }}
        </div>
        
        <div class="form-group">
            <label>{{ form.password.label }}</label>
            {{ form.password }}
            <small class="password-hint">※半角英数字を含む8文字以上</small>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">ログイン</button>
        
        <div class="links" style="font-size: 14px; margin-top: 20px;">
            <div>
                <a href="{% url 'choco_palette:signup' %}" style="color: var(--primary-color);">アカウント登録</a>
            </div>
            <div style="margin-top: 15px;">
                <a href="{% url 'choco_palette:password_reset' %}" style="color: var(--primary-color);">パスワードを忘れた方はこちら</a>
            </div>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const loginForm = document.getElementById('login-form');
        let isSubmitting = false;

        loginForm.addEventListener('submit', function(event) {
            if (isSubmitting) {
                event.preventDefault();
                return;
            }

            isSubmitting = true;

            const submitButton = event.submitter;
            if (submitButton) {
                submitButton.disabled = true;
                submitButton.innerText = '送信中...';
                submitButton.style.opacity = '0.6';
                submitButton.style.cursor = 'not-allowed';
            }
        });
    });
</script>
{% endblock %}
