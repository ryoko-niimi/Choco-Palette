<!--テイスティング投稿検索・絞り込み画面-->

{% extends "base.html" %}

{% block header_left %}
<a href="{% url 'choco_palette:post_list' %}" style="text-decoration:none; color:#4a2c2a;">🔙</a>
{% endblock %}

{% block content %}
<div class="card" style="width: 100%; max-width: 500px; margin: 20px auto; padding: 20px;">
    <form method="GET" action="{% url 'choco_palette:post_list' %}">
        
        <div class="form-group">
            <label>キーワード</label>
            <input type="text" name="q" placeholder="商品名・ブランド名を入力してください">
        </div>

        {% if user.is_authenticated %}
        <div class="form-group">
            <label>表示範囲</label>
            <div>
                <label style="display: inline-block;"><input type="checkbox" name="status" value="public"> 公開</label>
                <label style="display: inline-block;"><input type="checkbox" name="status" value="private"> 非公開</label>
            </div>
        </div>
        {% endif %}

        <div class="form-group">
            <label>カカオ含有率 (%)</label>
            <div style="display: flex; gap: 5px; align-items: center;">
                <input type="number" name="min_cacao" placeholder="最小">
                <span>～</span>
                <input type="number" name="max_cacao" placeholder="最大">
            </div>
        </div>

        <div class="form-group">
            <label>テイスティング日</label>
            <input type="date" name="start_date">
            <input type="date" name="end_date">
        </div>

        <div class="form-group">
            <label>お気に入り度</label>
            <div>
                {% for i in "12345"|make_list %}
                    <label style="display: inline-block;"><input type="checkbox" name="rate" value="{{ i }}"> ⭐{{ i }}</label>
                {% endfor %}
            </div>
        </div>

        <div class="form-group">
            <label>味</label>
            <div>
                {% for tag in taste_tags %}
                    <label style="display: inline-block;"><input type="checkbox" name="taste" value="{{ tag.id }}"> {{ tag.name }}</label>
                {% endfor %}
            </div>
        </div>

        <div class="form-group">
            <label>香り</label>
            <div>
                {% for tag in aroma_tags %}
                    <label style="display: inline-block;"><input type="checkbox" name="aroma" value="{{ tag.id }}"> {{ tag.name }}</label>
                {% endfor %}
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">検索</button>
    </form>
</div>



{% endblock %}
